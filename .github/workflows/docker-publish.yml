name: Publish Docker image to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Extra tag to push (in addition to the defaults)"
        required: false
        type: string
  # Also rebuild after a successful upstream sync. The sync workflow's push
  # uses GITHUB_TOKEN, which by design does not retrigger `push` events —
  # so we chain via workflow_run instead.
  workflow_run:
    workflows: ["Sync from upstream"]
    types: [completed]
    branches: [main]

env:
  # Image repositories on Docker Hub.
  # `bedrock-access-gateway` publishes the ECS/Fargate image (plain uvicorn,
  # works anywhere — ECS, Kubernetes, docker run, docker-compose).
  # `bedrock-access-gateway-lambda` publishes the AWS Lambda image
  # (includes the Lambda Web Adapter; only useful on Lambda).
  ECS_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/bedrock-access-gateway
  LAMBDA_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/bedrock-access-gateway-lambda

jobs:
  ecs:
    name: Build & push ECS/Fargate image (multi-arch)
    runs-on: ubuntu-latest
    # On workflow_run triggers, only proceed if the sync finished successfully.
    # For all other triggers (push, tags, manual dispatch) this evaluates true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECS_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile_ecs
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ecs
          cache-to: type=gha,mode=max,scope=ecs

  lambda:
    name: Build & push Lambda image (arm64)
    runs-on: ubuntu-latest
    # On workflow_run triggers, only proceed if the sync finished successfully.
    # For all other triggers (push, tags, manual dispatch) this evaluates true.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.LAMBDA_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      # Lambda requires Docker V2 Schema 2 without OCI attestations, so
      # provenance and SBOM must be disabled. See upstream issue #206.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./src
          file: ./src/Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=lambda
          cache-to: type=gha,mode=max,scope=lambda

  description:
    name: Sync README to Docker Hub overview
    needs: [ecs, lambda]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Update ECS image overview
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.ECS_IMAGE }}
          readme-filepath: ./README.md
          short-description: "OpenAI-compatible REST proxy for Amazon Bedrock (FastAPI). ECS/Fargate image."
          enable-url-completion: true

      - name: Update Lambda image overview
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.LAMBDA_IMAGE }}
          readme-filepath: ./README.md
          short-description: "OpenAI-compatible REST proxy for Amazon Bedrock. AWS Lambda image (Web Adapter)."
          enable-url-completion: true
